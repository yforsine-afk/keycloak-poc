apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        fsGroup: 26   # ✅ สำคัญสำหรับ OpenShift

      containers:
        - name: postgres
          image: registry.redhat.io/rhel8/postgresql-15

          env:
            - name: POSTGRESQL_DATABASE
              value: keycloak

            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: POSTGRES_USER

            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: POSTGRES_PASSWORD

          ports:
            - containerPort: 5432

          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
