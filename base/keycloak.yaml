env:
  - name: KC_DB
    value: postgres

  - name: KC_DB_URL
    value: jdbc:postgresql://postgres:5432/keycloak

  - name: KC_DB_USERNAME
    valueFrom:
      secretKeyRef:
        name: keycloak-secret
        key: POSTGRES_USER

  - name: KC_DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-secret
        key: POSTGRES_PASSWORD

  - name: KEYCLOAK_ADMIN
    valueFrom:
      secretKeyRef:
        name: keycloak-secret
        key: KEYCLOAK_ADMIN

  - name: KEYCLOAK_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-secret
        key: KEYCLOAK_ADMIN_PASSWORD

  - name: KC_PROXY
    value: edge

  - name: KC_HOSTNAME
    value: keycloak-poc.apps.<your-domain>
